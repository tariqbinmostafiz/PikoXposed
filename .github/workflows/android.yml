name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: false   # manually clone piko below for reliability

    - name: Clone piko
      run: |
        git clone --depth=1 https://github.com/crimera/piko.git piko

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Write signing key
      run: |
        echo KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} > signing.properties
        echo KEYSTORE_ALIAS=${{ secrets.KEYSTORE_ALIAS }} >> signing.properties
        echo KEYSTORE_ALIAS_PASSWORD='${{ secrets.KEYSTORE_ALIAS_PASSWORD }}' >> signing.properties
        echo KEYSTORE_FILE=../key.jks >> signing.properties
        echo ${{ secrets.KEYSTORE }} | base64 --decode > key.jks

    - name: Build Debug
      run: ./gradlew assembleDebug

    - name: Build Release
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: pikoxposed-ci-debug-apk
        path: app/build/outputs/apk/debug

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: pikoxposed-ci-release-apk
        path: |
          app/build/outputs/apk/release
          app/build/outputs/mapping/release/mapping.txt

    - name: Create AutoBuild Release
      run: |
        LATEST_REL=$(gh release view --json tagName -q .tagName 2>/dev/null || echo "")
        GIT_DESCRIBE=$(git rev-parse --short HEAD)
        cd app/build/outputs/apk/release/
        mv app-release.apk PikoXposed-${GIT_DESCRIBE}.apk
        gh release delete autobuild --yes || true
        NOTES="Nightly build from commit ${GIT_DESCRIBE}."
        if [ -n "$LATEST_REL" ]; then
          NOTES="$NOTES See changes: https://github.com/${{ github.repository }}/compare/${LATEST_REL}...main"
        fi
        gh release create autobuild PikoXposed-${GIT_DESCRIBE}.apk \
          --prerelease \
          --title "Nightly Build ${GIT_DESCRIBE}" \
          --notes "$NOTES"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
